[pytest]
asyncio_mode = auto
# pytest-asyncio 1.x no longer honors a conftest-defined `event_loop`
# fixture override - it always manages its own loop(s), scoped per this
# setting. Session-scoped here so every async fixture and test in a run
# shares ONE event loop, matching what tests/conftest.py's module-level
# `test_engine` (and its connection pool) actually need: a pooled asyncpg
# connection opened under one event loop is unusable once that loop is
# closed, which is exactly what a per-test loop scope caused (see
# InterfaceError: "another operation is in progress" in setup_db).
asyncio_default_fixture_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning